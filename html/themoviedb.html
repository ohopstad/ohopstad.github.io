<!DOCTYPE html>
    <head>
        <meta charset="UTF-8">
        <title>Hello, welcome</title>
        <script src="../js/themoviedb.js"></script>
        <link rel="stylesheet" href="../css/tmdb.css">
    </head>
    <body>
        <header>
            <h1>WARNING: This is an experimental page for testing themoviedb.org API requests</h1>
            <p>Thread carefully.</p>
        </header>
        <label for="api_v3">TMDB API_key v3</label>
        <input id="api_v3" placeholder="v3"><br>
        <label for="api_v4">TMDB API-key v4</label>
        <input id="api_v4" placeholder="v4"><br>
        <div id="api_problems" style="display:none;"></div>

        <!--actual tests-->
        <h2>Search</h2>
        <input type="text" id="id" placeholder="ID"><br>
        <select id="service">
            <option value="tmdb">TMDB</option>
            <option value="imdb">IMDB</option>
            <option value="tvdb">TVDB</option>
            <option value="facebook">Facebook</option>
            <option value="twitter">Twitter</option>
            <option value="instagram">Instagram</option>
        </select><br>
        <input type="text" id="query" placeholder="title" value="final"><br>
        <select id="tv-or-movie">
            <option value="tv">TV</option>
            <option value="movie">Movies</option>
        </select><br>
        <input type="text" id="language" placeholder="language" value="en-US"><br>
        <label for="include-adult">adult content</label>
        <input type="checkbox" id="include-adult"><br>
        <input type="number" id="year" placeholder="Year YYYY">
        <button id="go">Test_start</button><br>
        <label for="output">Result</label><br>
        <div id="output"></div>       
    </body>
    <script language='javascript'>
        document.getElementById('go').addEventListener('click', search);
    </script>
</html>
