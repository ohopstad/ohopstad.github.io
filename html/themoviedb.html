<!DOCTYPE html>
    <head>
        <meta charset="UTF-8">
        <title>Hello, welcome</title>
    </head>
    <body>
        <header>
            <h1>WARNING: This is an experimental page for testing themoviedb.org API requests</h1>
            <p>Thread carefully.</p>
        </header>
        <div id="side_menu"></div> <!--TODO: add multiple different lists and search functions?-->
        <script type="text/javascript">
            function test_ext_id_inline(){
                const url = "https://api.themoviedb.org/3/"
                let form = document.querySelector("#ID_tests");
                let key = document.querySelector("#tmdb_key").value;
                if(key == ""){
                    document.querySelector("#api_problems").innerHTML = "Remember to insert your API key from <a href='https://www.themoviedb.org/settings/api'>Your tmdb settings page</a>";
                    return;
                }
                let imdb = form.elements["imdb_id"];
                let tvdb = form.elements["tvdb_id"];
                fetch(url + "find/" + imdb 
                    + "?api_key=" + key 
                    + "&language=" + "en-US"
                    + "&external_source=" + "imdb_id")
                .then(function(data){
                    console.log("TMDB_api => IMDB_id");
                    console.log(data.json());
                });
                fetch(url + "find/" + tvdb 
                    + "?api_key=" + key 
                    + "&language=" + "en-US"
                    + "&external_source=" + "tvdb_id")
                .then(function(data){
                    console.log("TMDB_api => TVDB_id");
                    console.log(data.json());
                });
                console.log("..END of test..");
            }
        </script>
        <input id="tmdb_key" placeholder="TMDB key v3">
        <div id="api_problems" style="display:none"></div>
        <form id="ID_tests" onSubmit=test_ext_id_inline()>
            <h2>external ID</h2>
            <input type="text" name="imdb_id" value="tt1399045"><br>
            <input type="text" name="tvdb_id" value="74205"><br>
            <input type="submit">
        </form>
    </body>
</html>
